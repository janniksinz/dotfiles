---
- name: Install Go
  ansible.builtin.include_tasks:
    file: "install-{{ 'debian' if ansible_os_family == 'Debian' else 'arch' }}.yml"

- name: Ensure GOPATH bin directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/go/bin"
    state: directory
    mode: "0755"

- name: Install Go tools
  ansible.builtin.command:
    cmd: "go install {{ item.package }}"
  environment:
    GOPATH: "{{ user_home }}/go"
    PATH: "{{ ansible_facts['env']['PATH'] }}:/usr/local/go/bin:{{ user_home }}/go/bin"
  loop: "{{ go_tools }}"
  register: go_tool_result
  changed_when: false
  args:
    creates: "{{ user_home }}/go/bin/{{ item.cmd }}"
