# Managed by Ansible - tmux role

# Core Settings
set -sg escape-time 0
set -g history-limit 10000
set -g base-index 0
setw -g pane-base-index 0
set -g mouse on
set-option -g allow-rename off
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Prefix
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# Reload
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Pane splitting
unbind '"'
unbind %
bind e split-window -h -c "#{pane_current_path}"
bind a split-window -v -c "#{pane_current_path}"

# Pane navigation
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Pass C-l through
unbind -n C-l
bind -n C-l send-keys C-l

# Window swapping
unbind Left
unbind Right
bind Left  swap-window -d -t -1
bind Right swap-window -d -t +1

# Sort Sessions
bind s choose-tree -sZ -O name

# Bell
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Status Bar
set -g status-position bottom
set -g status-justify left
set -g status-interval 1
set -g status-left "#{prefix_highlight} #{session_name} "
set -g status-left-length 50
set -g status-right "#{cpu_percentage}  #{host}  %Y-%m-%d %H:%M "
set -g status-right-length 80

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# Catppuccin
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'

# Plugin options
set -g @continuum-restore 'on'

# TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'
