---
- name: Install tmux
  ansible.builtin.include_tasks:
    file: "install-{{ 'debian' if ansible_os_family == 'Debian' else 'arch' }}.yml"

- name: Install TPM
  ansible.builtin.git:
    repo: https://github.com/tmux-plugins/tpm.git
    dest: "{{ user_home }}/.tmux/plugins/tpm"
    depth: 1
    update: false

- name: Deploy tmux config
  ansible.builtin.copy:
    src: tmux.conf
    dest: "{{ user_home }}/.tmux.conf"
    mode: "0644"
