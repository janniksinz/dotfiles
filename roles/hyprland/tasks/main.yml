---
- name: Skip on WSL
  ansible.builtin.meta: end_role
  when: ansible_host_environment_is_wsl | default(false) | bool

- name: Install hyprland packages
  become: true
  community.general.pacman:
    name: "{{ hyprland_packages }}"
    state: present

- name: Ensure hyprland config directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.config/hypr/modules"
    state: directory
    mode: "0755"

- name: Deploy hyprland main config
  ansible.builtin.template:
    src: hyprland.conf.j2
    dest: "{{ user_home }}/.config/hypr/hyprland.conf"
    mode: "0644"
    backup: true

- name: Deploy hyprland module configs
  ansible.builtin.copy:
    src: "modules/{{ item }}"
    dest: "{{ user_home }}/.config/hypr/modules/{{ item }}"
    mode: "0644"
  loop:
    - layout.conf
    - binds.conf
    - input.conf

- name: Deploy hyprlock config
  ansible.builtin.copy:
    src: hyprlock.conf
    dest: "{{ user_home }}/.config/hypr/hyprlock.conf"
    mode: "0644"

- name: Deploy hypridle config
  ansible.builtin.copy:
    src: hypridle.conf
    dest: "{{ user_home }}/.config/hypr/hypridle.conf"
    mode: "0644"
