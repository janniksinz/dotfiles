---
- name: Install zsh
  ansible.builtin.include_tasks:
    file: "install-{{ 'debian' if ansible_os_family == 'Debian' else 'arch' }}.yml"

- name: Set zsh as default shell
  become: true
  ansible.builtin.user:
    name: "{{ host_user }}"
    shell: /usr/bin/zsh

- name: Install oh-my-zsh
  ansible.builtin.git:
    repo: https://github.com/ohmyzsh/ohmyzsh.git
    dest: "{{ user_home }}/.oh-my-zsh"
    depth: 1
    update: false

- name: Install zsh-autosuggestions plugin
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-autosuggestions.git
    dest: "{{ user_home }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
    depth: 1
    update: false

- name: Install zsh-syntax-highlighting plugin
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
    dest: "{{ user_home }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
    depth: 1
    update: false

- name: Deploy .zshrc
  ansible.builtin.template:
    src: zshrc.j2
    dest: "{{ user_home }}/.zshrc"
    mode: "0644"
    backup: true
