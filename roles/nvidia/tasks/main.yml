---
- name: Skip on WSL
  ansible.builtin.meta: end_role
  when: ansible_host_environment_is_wsl | default(false) | bool

- name: Install nvidia packages
  become: true
  community.general.pacman:
    name: "{{ nvidia_packages }}"
    state: present

- name: Install 32-bit nvidia/vulkan libs for gaming
  become: true
  community.general.pacman:
    name:
      - lib32-nvidia-utils
      - lib32-opencl-nvidia
      - lib32-vulkan-icd-loader
    state: present
  when: "'gaming' in (default_roles | default([]))"

- name: Deploy nvidia modprobe configuration
  become: true
  ansible.builtin.template:
    src: nvidia-modprobe.conf.j2
    dest: /etc/modprobe.d/nvidia.conf
    owner: root
    group: root
    mode: "0644"
  notify: rebuild initramfs

- name: Configure nvidia modules in mkinitcpio
  become: true
  ansible.builtin.lineinfile:
    path: /etc/mkinitcpio.conf
    regexp: '^MODULES=\(.*\)'
    line: "MODULES=({{ nvidia_kernel_modules | join(' ') }})"
    backup: true
  notify: rebuild initramfs

- name: Ensure pacman hooks directory exists
  become: true
  ansible.builtin.file:
    path: /etc/pacman.d/hooks
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy pacman hook for nvidia initramfs rebuild
  become: true
  ansible.builtin.copy:
    content: |
      [Trigger]
      Operation=Install
      Operation=Upgrade
      Operation=Remove
      Type=Package
      Target=nvidia-open
      Target=linux
      Target=linux-headers

      [Action]
      Description=Regenerating initramfs after nvidia/kernel update...
      Depends=mkinitcpio
      When=PostTransaction
      NeedsTargets
      Exec=/usr/bin/mkinitcpio -P
    dest: /etc/pacman.d/hooks/nvidia.hook
    owner: root
    group: root
    mode: "0644"

- name: Deploy nvidia power management udev rules
  become: true
  ansible.builtin.copy:
    content: |
      # Managed by Ansible - nvidia role
      # Enable runtime PM for nvidia GPU
      ACTION=="add", SUBSYSTEM=="pci", ATTR{vendor}=="0x10de", ATTR{class}=="0x030000", ATTR{power/control}="auto"
      ACTION=="add", SUBSYSTEM=="pci", ATTR{vendor}=="0x10de", ATTR{class}=="0x030200", ATTR{power/control}="auto"
    dest: /etc/udev/rules.d/80-nvidia-pm.rules
    owner: root
    group: root
    mode: "0644"
  when: nvidia_power_management
  notify: reload udev rules

- name: Check if nvidia-suspend service exists
  ansible.builtin.stat:
    path: /usr/lib/systemd/system/nvidia-suspend.service
  register: nvidia_suspend_unit

- name: Enable nvidia suspend/hibernate/resume services
  become: true
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
  loop: "{{ nvidia_services }}"
  when: nvidia_suspend_unit.stat.exists | default(false)

- name: Deploy hyprland nvidia environment config
  ansible.builtin.blockinfile:
    path: "{{ user_home }}/.config/hypr/modules/env.conf"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - nvidia"
    block: |
      env = XCURSOR_SIZE,24
      env = HYPRCURSOR_SIZE,24
      env = LIBVA_DRIVER_NAME,nvidia
      env = __GLX_VENDOR_LIBRARY_NAME,nvidia
      env = NVD_BACKEND,direct
      env = ELECTRON_OZONE_PLATFORM_HINT,auto
    create: true
    owner: "{{ host_user }}"
    mode: "0644"
  when: "'hyprland' in (default_roles | default([]))"

- name: Ensure journald config directory exists
  become: true
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Limit journal size (nvidia GSP firmware log spam prevention)
  become: true
  ansible.builtin.copy:
    content: |
      [Journal]
      SystemMaxUse=2G
      SystemMaxFileSize=256M
    dest: /etc/systemd/journald.conf.d/size.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart journald

- name: Ensure coredump config directory exists
  become: true
  ansible.builtin.file:
    path: /etc/systemd/coredump.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Limit coredump size (prevent crash loop disk fill)
  become: true
  ansible.builtin.copy:
    content: |
      [Coredump]
      MaxUse=1G
      KeepFree=2G
    dest: /etc/systemd/coredump.conf.d/limit.conf
    owner: root
    group: root
    mode: "0644"

- name: Verify nvidia modprobe config exists
  ansible.builtin.stat:
    path: /etc/modprobe.d/nvidia.conf
  register: nvidia_modprobe_stat

- name: Verify nvidia modules in mkinitcpio
  ansible.builtin.command:
    cmd: grep -q "nvidia nvidia_modeset nvidia_uvm nvidia_drm" /etc/mkinitcpio.conf
  changed_when: false
  failed_when: false
  register: nvidia_mkinitcpio_check
