---
# ====================================================================
# DOTFILES CONFIGURATION — Arch Linux + Hyprland + Nvidia
# ====================================================================
# Run: dotfiles
# Selective: dotfiles -t nvidia,hyprland
# Check mode: ansible-playbook main.yml --check --diff

# --------------------------------------------------------------------
# ROLE SELECTION
# --------------------------------------------------------------------
default_roles:
  # === Foundation ===
  - base
  - fonts
  - swap
  - nvidia
  - audio
  - network

  # === Desktop Environment ===
  - sddm
  - hyprland
  - waybar
  - swaync
  - rofi
  - theming

  # === Terminal & Shell ===
  - kitty
  - zsh
  - tmux
  - fzf
  - bat
  - lsd
  - zoxide

  # === Development ===
  - git
  - neovim
  - lazygit
  - docker
  - gh

  # === Languages ===
  - go
  - python
  - npm
  - conda

  # === Applications ===
  - brave
  - chrome
  - spotify
  - obs
  - zathura
  - tldr

  # === Security & Auth ===
  - ssh
  - 1password
  - gcm
  - gnome-keyring
  - claude

  # === Optional (uncomment to enable) ===
  # - gaming
  # - virtualization

# Roles to explicitly skip
# exclude_roles:
#   - gaming

# --------------------------------------------------------------------
# USER CONFIGURATION
# --------------------------------------------------------------------
git_user_name: "janniksinz"
host_user: "wednesday"
user_home: "/home/{{ host_user }}"

# --------------------------------------------------------------------
# 1PASSWORD INTEGRATION
# --------------------------------------------------------------------
op:
  git:
    user:
      email: "op://api_keys/Github/Github SSH/email"
    allowed_signers: "op://api_keys/Github/Github SSH/allowed_signers"
  ssh:
    personal:
      - name: id_ed25519
        vault_path: "op://api_keys/Github SSH Key/public key"

git_profiles:
  - name: personal
    email_vault: "op://api_keys/Github/email"
    signing_key_vault: "op://api_keys/Github SSH Key/public key"
    match: "~/private/*"
  - name: work
    email_vault: "op://MCB/MB Gitlab MBOS Cloud/username"
    signing_key_vault: "op://MCB/MB Git MBOS Cloud/public key"
    match: "~/work/*"

gcm_work:
  git_host: "git.mbos.cloud"
  gitlab_client_id: "op://MCB/MB Gitlab MBOS Cloud/clientID"

# --------------------------------------------------------------------
# NVIDIA
# --------------------------------------------------------------------
nvidia:
  power_management: true
  preserve_vram: true

# --------------------------------------------------------------------
# SWAP
# --------------------------------------------------------------------
swap:
  zram_size_gb: 16
  algorithm: zstd

# --------------------------------------------------------------------
# NETWORK
# --------------------------------------------------------------------
network:
  bluetooth: true
  firewall: true

# --------------------------------------------------------------------
# HYPRLAND
# --------------------------------------------------------------------
hyprland:
  monitor: ",3840x2160@144,auto,auto"
  terminal: kitty
  file_manager: dolphin
  menu: "rofi -show drun"

# --------------------------------------------------------------------
# THEMING (Catppuccin Mocha)
# --------------------------------------------------------------------
theming:
  gtk_theme: catppuccin-mocha-blue-standard+default
  icon_theme: Papirus-Dark
  cursor_theme: catppuccin-mocha-dark-cursors
  cursor_size: 24
  font: "JetBrainsMono Nerd Font 11"

# --------------------------------------------------------------------
# SHELL
# --------------------------------------------------------------------
zsh:
  plugins:
    - git
    - fzf
    - docker
    - ssh-agent
  extra_paths:
    - "$HOME/.local/bin"
    - "$HOME/go/bin"
    - "$HOME/.npm-global/bin"

# --------------------------------------------------------------------
# DEVELOPMENT
# --------------------------------------------------------------------
git:
  default_branch: main
  editor: nvim
  signing: true

go:
  tools:
    - package: github.com/go-task/task/v3/cmd/task@latest
      cmd: task
    - package: github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      cmd: golangci-lint

python:
  pipx_packages:
    - black
    - ruff
    - virtualenv

# --------------------------------------------------------------------
# CLAUDE CODE
# --------------------------------------------------------------------
claude:
  op_bearer_token: "op://MCB/MB oneAPI Opus4.6/credential"
  op_base_url: "op://MCB/MB oneAPI Opus4.6/hostname"

# --------------------------------------------------------------------
# GAMING (when enabled)
# --------------------------------------------------------------------
gaming:
  steam: true
  minecraft: true
  modrinth: true
  gamemode: true
  mangohud: true
